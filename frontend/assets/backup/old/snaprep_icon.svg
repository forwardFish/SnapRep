<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main gradient for the icon -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF7F50;stop-opacity:1" />
    </linearGradient>

    <!-- Shadow gradient -->
    <linearGradient id="shadowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7F50;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0.1" />
    </linearGradient>

    <!-- White highlight gradient -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.4);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.1);stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shadow circle -->
  <circle cx="60" cy="64" r="48" fill="url(#shadowGradient)" />

  <!-- Main logo circle -->
  <circle cx="60" cy="60" r="48" fill="url(#iconGradient)" />

  <!-- Top highlight -->
  <ellipse cx="60" cy="40" rx="40" ry="25" fill="url(#highlight)" />

  <!-- SnapRep Icon Design - represents "60-second workout with objects" -->
  <g transform="translate(60, 60)" fill="white">

    <!-- Central "S" shape - represents "Snap" action -->
    <path d="M-12,-18 Q-8,-22 -4,-18 L8,-6 Q12,-2 8,2 L-4,14 Q-8,18 -12,14 L4,2 Q8,-2 4,-6 L-8,-18 Q-12,-22 -8,-26"
          fill="white" stroke="none" opacity="0.9" />

    <!-- Fitness dumbbell icon integrated into design -->
    <g transform="translate(0, 0)">
      <!-- Dumbbell bar -->
      <rect x="-14" y="-3" width="28" height="6" rx="3" fill="white" opacity="0.8" />

      <!-- Left weight -->
      <rect x="-18" y="-8" width="6" height="16" rx="2" fill="white" opacity="0.7" />

      <!-- Right weight -->
      <rect x="12" y="-8" width="6" height="16" rx="2" fill="white" opacity="0.7" />

      <!-- Center grip -->
      <rect x="-6" y="-4" width="12" height="8" rx="1" fill="white" opacity="0.6" />
    </g>

    <!-- Motion dots representing "Rep" repetition -->
    <g opacity="0.7">
      <!-- Top arc dots -->
      <circle cx="16" cy="-12" r="2" fill="white" opacity="0.9" />
      <circle cx="12" cy="-16" r="1.5" fill="white" opacity="0.7" />
      <circle cx="8" cy="-18" r="1" fill="white" opacity="0.5" />

      <!-- Bottom arc dots -->
      <circle cx="-16" cy="12" r="2" fill="white" opacity="0.9" />
      <circle cx="-12" cy="16" r="1.5" fill="white" opacity="0.7" />
      <circle cx="-8" cy="18" r="1" fill="white" opacity="0.5" />
    </g>

    <!-- "60s" time indicator -->
    <g transform="translate(18, -18)" opacity="0.8">
      <circle cx="0" cy="0" r="8" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1" />
      <text x="0" y="2" text-anchor="middle" font-size="6" font-weight="600" fill="white">60</text>
    </g>

  </g>

  <!-- Subtle outer glow effect -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="rgba(255,215,0,0.3)" stroke-width="2" opacity="0.6" />
</svg>