apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
// Flutter plugin will be applied via app_plugin_loader.gradle

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1.0.1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0.1'
}

android {
    namespace "com.snaprep.fitness"
    compileSdkVersion 34
    buildToolsVersion "35.0.0"
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.snaprep.fitness"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        // ✅ 改成固定 21（或更高，比如 23/24 都可以）
        minSdkVersion flutter.minSdkVersion

        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        // 👇 加这一行
        multiDexEnabled true
    }

// 👇 就在这里加 signingConfigs 和 buildTypes
    signingConfigs {
        release {
            if (keystoreProperties['storeFile']) {
                storeFile rootProject.file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }
    
    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            // signingConfig signingConfigs.debug
            signingConfig signingConfigs.release
            // 看你需不需要混淆，先关掉最稳
            minifyEnabled false
            // 禁用资源压缩，避免构建错误
            shrinkResources false
            // 禁用ProGuard
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
            shrinkResources false
        }
    }

    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = false
        }
    }

    // 强制所有依赖使用 API 35
    configurations.all {
        resolutionStrategy {
            // 使用存在的 androidx.annotation 版本
            force 'androidx.annotation:annotation:1.8.0'
            force 'androidx.annotation:annotation-experimental:1.4.0'
        }
    }

    // 覆盖子模块的compileSdkVersion
    subprojects {
        afterEvaluate { project ->
            if (project.hasProperty('android')) {
                project.android.compileSdkVersion 34
                project.android.targetSdkVersion 35
                if (project.android.hasProperty('buildToolsVersion')) {
                    project.android.buildToolsVersion '35.0.0'
                }
                if (project.android.hasProperty('defaultConfig')) {
                    project.android.defaultConfig.targetSdkVersion 35
                    project.android.defaultConfig.compileSdkVersion 34
                }
            }
        }
    }
}

// 在根级别强制所有项目使用API 34 编译，targetSdk 仍保持 35
allprojects {
    configurations.all {
        resolutionStrategy {
            eachDependency { details ->
                if (details.requested.name == 'compileSdkVersion') {
                    details.useVersion '34'
                    details.because 'Force compileSdkVersion to 34 for legacy plugin compatibility'
                }
            }
        }
    }
}




flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"

    // 👇 新增这一行
    implementation "androidx.multidex:multidex:2.0.1"
}

// 自动备份AAB文件的任务
afterEvaluate {
    tasks.named("bundleRelease").configure {
        doLast {
            def aabFile = file("$buildDir/outputs/bundle/release/app-release.aab")
            def backupDir = file("../../")
            def timestamp = System.currentTimeMillis()
            def backupFile = new File(backupDir, "snaprep-gradle-backup-${timestamp}.aab")
            
            if (aabFile.exists()) {
                copy {
                    from aabFile
                    into backupDir
                    rename { backupFile.name }
                }
                println "✅ AAB备份成功: ${backupFile.absolutePath}"
            } else {
                println "❌ AAB文件不存在: ${aabFile.absolutePath}"
            }
        }
    }
}
