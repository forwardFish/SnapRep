pluginManagement {
    // 全局插件仓库 - 使用国内镜像并允许不安全协议
    repositories {
        // // HTTP镜像源（避免SSL问题）
        // maven {
        //     url 'http://maven.aliyun.com/nexus/content/groups/public/'
        //     allowInsecureProtocol = true
        // }
        // // 阿里云 Google 仓库
        // maven {
        //     url 'https://maven.aliyun.com/repository/google'
        //     allowInsecureProtocol = true
        // }
        // // 阿里云 Gradle 插件仓库
        // maven {
        //     url 'https://maven.aliyun.com/repository/gradle-plugin'
        //     allowInsecureProtocol = true
        // }
        // 腾讯云镜像
        // maven {
        //     url 'https://mirrors.cloud.tencent.com/nexus/repository/maven-public/'
        //     allowInsecureProtocol = true
        // }
        // // 网易云镜像
        // maven {
        //     url 'https://mirrors.163.com/maven/repository/maven-public/'
        //     allowInsecureProtocol = true
        // }
        // 🔥 只使用HTTP镜像,避免TLS问题
        maven { url 'http://maven.aliyun.com/repository/google'; allowInsecureProtocol = true }
        maven { url 'http://maven.aliyun.com/repository/gradle-plugin'; allowInsecureProtocol = true }
        maven { url 'http://maven.aliyun.com/repository/public'; allowInsecureProtocol = true }
        maven { url 'http://maven.aliyun.com/repository/jcenter'; allowInsecureProtocol = true }
        maven {
            url 'https://storage.flutter-io.cn/download.flutter.io'
        }
        // ❌ 移除 google(), mavenCentral(), gradlePluginPortal() - 会导致TLS握手失败
    }

    // ======== Flutter SDK 配置（保持不变）========
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }
    settings.ext.flutterSdkPath = flutterSdkPath()

    includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")
}

// 全局依赖仓库 - 兼容Flutter 3.24.5的传统配置
dependencyResolutionManagement {
    repositories {
        // 🔥 只使用HTTP镜像,避免TLS问题
        maven { url 'http://maven.aliyun.com/repository/google'; allowInsecureProtocol = true }
        maven { url 'http://maven.aliyun.com/repository/public'; allowInsecureProtocol = true }
        maven { url 'http://maven.aliyun.com/repository/jcenter'; allowInsecureProtocol = true }
        maven {
            url 'https://storage.flutter-io.cn/download.flutter.io'
        }
        // ❌ 移除 google(), mavenCentral(), gradlePluginPortal() - 会导致TLS握手失败
    }
}

include ":app"

apply from: "${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle/app_plugin_loader.gradle"
