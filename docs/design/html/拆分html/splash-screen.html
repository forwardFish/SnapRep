<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapRep - Fitness Anywhere</title>
    <style>
        /* ========== CLEAN & MINIMAL DESIGN ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
            padding: 60px 40px;
        }

        /* ========== TOP SECTION - FITNESS ANYWHERE ========== */
        .top-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeInDown 0.8s ease-out;
        }

        .tagline {
            font-size: 32px;
            font-weight: 300;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* ========== BOTTOM SECTION - LOGO + BRAND ========== */
        .bottom-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .logo-container {
            margin-bottom: 20px;
        }

        .snaprep-logo {
            width: 140px;
            height: auto;
            filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.3));
        }

        /* ========== ANIMATIONS ========== */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== RESPONSIVE DESIGN ========== */
        @media (max-width: 480px) {
            body {
                padding: 40px 20px;
            }
            .tagline {
                font-size: 24px;
            }
            .snaprep-logo {
                width: 120px;
            }
        }
    </style>
</head>
<body>
    <!-- Top Section -->
    <div class="top-section">
        <div class="tagline">Fitness Anywhere</div>
    </div>

    <!-- Bottom Section -->
    <div class="bottom-section">
        <div class="logo-container">
            <!-- SnapRep SVG Logo -->
            <svg class="snaprep-logo" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
              <!-- Logo Background Circle -->
              <defs>
                <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
                  <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
                  <stop offset="100%" style="stop-color:#FF7F50;stop-opacity:1" />
                </linearGradient>
                <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
                  <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.95" />
                </linearGradient>
              </defs>

              <!-- Logo Icon -->
              <g transform="translate(10, 10)">
                <!-- Background Circle -->
                <circle cx="20" cy="20" r="18" fill="url(#logoGradient)" />

                <!-- Snap Icon - Camera/Lightning Bolt -->
                <g transform="translate(20, 20)" fill="white">
                  <!-- Lightning Bolt representing "Snap" action -->
                  <path d="M-8,-10 L2,-2 L-2,-2 L8,10 L-2,2 L2,2 Z" fill="white" stroke="none" />

                  <!-- Small circles representing movement/reps -->
                  <circle cx="10" cy="-8" r="1.5" fill="rgba(255,255,255,0.7)" />
                  <circle cx="8" cy="8" r="1" fill="rgba(255,255,255,0.5)" />
                  <circle cx="-10" cy="6" r="1.2" fill="rgba(255,255,255,0.6)" />
                </g>
              </g>

              <!-- Brand Text -->
              <g transform="translate(60, 25)">
                <!-- SnapRep Text -->
                <text x="0" y="0" font-family="SF Pro Display, Helvetica, Arial, sans-serif"
                      font-size="24" font-weight="800" fill="url(#textGradient)">
                  SnapRep
                </text>

                <!-- Tagline -->
                <text x="0" y="18" font-family="SF Pro Display, Helvetica, Arial, sans-serif"
                      font-size="9" font-weight="500" fill="rgba(255,255,255,0.8)" letter-spacing="1px">
                  FITNESS ANYWHERE
                </text>
              </g>
            </svg>
        </div>
    </div>
</body>
</html>
