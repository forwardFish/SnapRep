<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapRep - Target Areas | Choose your target zones</title>
    <style>
        /* ========== GLOBAL RESET & PREMIUM TYPOGRAPHY ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Color System based on reference */
            --orange-primary: #FF6B35;
            --orange-hover: #E55A30;
            --gray-unselected: #E5E5E5;
            --gray-text: #666666;
            --green-continue: #4CAF50;
            --green-continue-hover: #45A049;
            --text-primary: #333333;
            --text-secondary: #666666;
            --white: #FFFFFF;
            --light-gray: #F5F5F5;
            /* Yellow CTA colors for consistency with 03-guide-step2.html */
            --yellow-cta: #FFD700;
            --yellow-cta-hover: #FFC107;
            --yellow-shadow: 0 8px 24px rgba(255, 215, 0, 0.25);
            --premium-black: #1a1a1a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'Roboto', 'Segoe UI', system-ui, sans-serif;
            background: var(--white);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: auto;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        /* ========== PHONE FRAME SYSTEM ========== */
        .phone-frame {
            width: 375px;
            height: 812px;
            background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
            border-radius: 40px;
            padding: 8px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.12), 0 12px 40px rgba(0, 0, 0, 0.08);
            position: relative;
            overflow: hidden;
            margin: 60px auto;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .phone-frame:hover {
            transform: translateY(-8px);
            box-shadow: 0 32px 120px rgba(0, 0, 0, 0.15), 0 16px 60px rgba(0, 0, 0, 0.10);
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: #000000;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
        }

        /* ========== STATUS BAR ========== */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px 8px;
            color: #000;
            font-size: 14px;
            font-weight: 600;
            background: #ffffff;
        }

        /* ========== PAGE CONTENT ========== */
        .page-content {
            height: calc(100% - 44px);
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            background: #ffffff;
            display: flex;
            flex-direction: column;
        }

        /* ========== HEADER SECTION ========== */
        .header-section {
            padding: 24px;
            text-align: center;
            position: relative;
        }

        .back-button {
            position: absolute;
            left: 24px;
            top: 24px;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-primary);
            cursor: pointer;
            padding: 8px;
        }

        .progress-bar-container {
            margin: 16px 0 24px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--light-gray);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--green-continue);
            width: 66.7%; /* 2/3 complete */
            border-radius: 3px;
        }



        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 24px 0 8px;
            line-height: 1.2;
        }

        /* ========== MAIN CONTENT LAYOUT ========== */
        .main-content {
            flex: 1;
            display: flex;
            padding: 0 24px;
            gap: 20px;
            align-items: flex-start;
        }

        /* ========== BODY DIAGRAM SECTION ========== */
        .body-diagram-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
        }

        .body-diagram {
            width: 160px;
            height: 400px;
            background: url('https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80') no-repeat center;
            background-size: cover;
            border-radius: 20px;
            position: relative;
            filter: brightness(1.1) contrast(1.1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        /* ========== BODY PARTS SELECTION ========== */
        .body-parts-section {
            flex: 1;
            padding: 10px 0;
        }

        .body-part-button {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 10px;
            border: 2px solid #F5F5F5;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #FFFFFF;
            color: #333333;
        }

        .body-part-button.selected {
            background: #FF6B35 !important;
            color: #FFFFFF !important;
            border-color: #FF6B35 !important;
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
        }

        .body-part-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-color: #FF6B35;
        }

        .body-part-button.selected:hover {
            background: #E55A30 !important;
            border-color: #E55A30 !important;
        }

        /* ========== CONTINUE BUTTON (Matching 03-guide-step2.html) ========== */
        .bottom-section {
            padding: 20px 24px 40px;
        }

        .yellow-cta-button {
            background: var(--yellow-cta);
            color: var(--premium-black);
            border: none;
            border-radius: 16px;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            box-shadow: var(--yellow-shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        .yellow-cta-button:hover {
            background: var(--yellow-cta-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(255, 215, 0, 0.35);
        }

        .yellow-cta-button:disabled {
            background: #E0E0E0;
            color: #9E9E9E;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ========== RESPONSIVE ADJUSTMENTS ========== */
        @media (max-width: 400px) {
            .main-content {
                flex-direction: column;
                gap: 10px;
            }

            .body-diagram {
                width: 120px;
                height: 250px;
            }

            .body-part-button {
                font-size: 16px;
                padding: 14px 16px;
            }
        }

        /* ========== ANIMATIONS ========== */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="phone-frame float">
        <div class="phone-screen">
            <div class="status-bar">
                <span>9:58</span>
                <span>📶 4G📶 (43%)</span>
            </div>

            <div class="page-content">
                <!-- Header Section -->
                <div class="header-section">
                    <button class="back-button">←</button>

                    <div class="progress-bar-container">
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                    </div>

                    <h1 class="page-title">Choose your<br>target zones</h1>
                </div>

                <!-- Main Content: Left-Right Layout -->
                <div class="main-content">
                    <!-- Left Side: Body Diagram -->
                    <div class="body-diagram-section">
                        <div class="body-diagram"></div>
                    </div>

                    <!-- Right Side: Body Parts Selection -->
                    <div class="body-parts-section">
                        <button class="body-part-button" data-part="neck" onclick="selectBodyPart(this, 'neck')">
                            Neck
                        </button>
                        <button class="body-part-button selected" data-part="pecs" onclick="selectBodyPart(this, 'pecs')">
                            Pecs
                        </button>
                        <button class="body-part-button selected" data-part="arms" onclick="selectBodyPart(this, 'arms')">
                            Arms
                        </button>
                        <button class="body-part-button selected" data-part="belly" onclick="selectBodyPart(this, 'belly')">
                            Belly
                        </button>
                        <button class="body-part-button selected" data-part="back" onclick="selectBodyPart(this, 'back')">
                            Back
                        </button>
                        <button class="body-part-button" data-part="legs" onclick="selectBodyPart(this, 'legs')">
                            Legs
                        </button>
                        <button class="body-part-button" data-part="knees" onclick="selectBodyPart(this, 'knees')">
                            Knees
                        </button>
                        <button class="body-part-button" data-part="lower-back" onclick="selectBodyPart(this, 'lower-back')">
                            Lower back
                        </button>
                    </div>
                </div>

                <!-- Bottom Section: Continue Button -->
                <div class="bottom-section">
                    <button class="yellow-cta-button" id="continueBtn" onclick="continueToWorkout()">
                        Continue
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Selected body parts array (matching the reference image defaults)
        let selectedBodyParts = ['pecs', 'arms', 'belly', 'back'];

        function selectBodyPart(button, partName) {
            const isSelected = button.classList.contains('selected');

            if (isSelected) {
                // Deselect the body part
                button.classList.remove('selected');
                selectedBodyParts = selectedBodyParts.filter(part => part !== partName);
            } else {
                // Select the body part
                button.classList.add('selected');
                selectedBodyParts.push(partName);
            }

            // Update continue button state
            updateContinueButton();

            // Store selections in localStorage
            localStorage.setItem('selectedTargetZones', JSON.stringify(selectedBodyParts));
        }

        function updateContinueButton() {
            const continueBtn = document.getElementById('continueBtn');
            // Enable button if at least one body part is selected
            continueBtn.disabled = selectedBodyParts.length === 0;
        }

        function continueToWorkout() {
            if (selectedBodyParts.length > 0) {
                // Store final selections
                localStorage.setItem('selectedTargetZones', JSON.stringify(selectedBodyParts));

                // Show selected parts (in actual app this would navigate to workout screen)
                alert(`Selected target zones: ${selectedBodyParts.join(', ')}\n\nReady to start your personalized workout!`);

                // Example navigation: window.location.href = '05-workout-screen.html';
            }
        }

        // Add interactive feedback to buttons
        document.querySelectorAll('.body-part-button').forEach(button => {
            button.addEventListener('mouseenter', function() {
                if (!this.classList.contains('selected')) {
                    this.style.background = '#F8F8F8';
                    this.style.borderColor = '#FF6B35';
                }
            });

            button.addEventListener('mouseleave', function() {
                if (!this.classList.contains('selected')) {
                    this.style.background = '#FFFFFF';
                    this.style.borderColor = '#F5F5F5';
                }
            });
        });

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Target zones selection page loaded');

            // Update continue button state
            updateContinueButton();

            // Store initial selections
            localStorage.setItem('selectedTargetZones', JSON.stringify(selectedBodyParts));

            console.log('Initial selected parts:', selectedBodyParts);
        });

        // Add back button functionality
        document.querySelector('.back-button').addEventListener('click', function() {
            // In actual app: window.history.back() or navigate to previous page
            alert('Navigate back to previous step');
        });
    </script>
</body>
</html>
