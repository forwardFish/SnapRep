<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapRep - Workout Complete | Achievement Card</title>
    <style>
        /* ========== GLOBAL RESET & PREMIUM TYPOGRAPHY ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Premium Color System */
            --primary-gradient: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 25%, #FF7F50 50%, #FFB347 75%, #FFA500 100%);
            --crystal-white: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(255, 255, 255, 0.92) 30%, rgba(255, 255, 255, 0.85) 60%, rgba(255, 255, 255, 0.1) 100%);
            --glass-effect: linear-gradient(135deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 100%);
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.04), 0 2px 16px rgba(255, 127, 80, 0.08);
            --shadow-medium: 0 12px 48px rgba(0, 0, 0, 0.08), 0 4px 24px rgba(255, 127, 80, 0.12);
            --text-primary: #2C3E50;
            --text-secondary: #546E7A;
            --text-caption: #90A4AE;

            /* Reference UI Style - Premium Yellow CTA */
            --yellow-cta: #FFD700;
            --yellow-cta-hover: #FFC107;
            --yellow-shadow: 0 8px 24px rgba(255, 215, 0, 0.25);
            --premium-black: #1a1a1a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'Roboto', 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(ellipse at top, #f8fafc 0%, #ffffff 50%, #f1f5f9 100%);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: auto;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        /* ========== PHONE FRAME SYSTEM ========== */
        .phone-frame {
            width: 375px;
            height: 812px;
            background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
            border-radius: 40px;
            padding: 8px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.12), 0 12px 40px rgba(0, 0, 0, 0.08);
            position: relative;
            overflow: hidden;
            margin: 60px auto;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .phone-frame:hover {
            transform: translateY(-8px);
            box-shadow: 0 32px 120px rgba(0, 0, 0, 0.15), 0 16px 60px rgba(0, 0, 0, 0.10);
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: #000000;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
        }

        /* ========== STATUS BAR ========== */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px 8px;
            color: #000;
            font-size: 14px;
            font-weight: 600;
            background: #ffffff;
        }

        /* ========== PAGE CONTENT & SCROLLING ========== */
        .page-content {
            height: calc(100% - 44px);
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            background: #ffffff;
        }

        .full-height-content {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        /* ========== PREMIUM CARD SYSTEM ========== */
        .premium-card {
            background: var(--crystal-white);
            backdrop-filter: blur(24px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
        }

        .premium-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-medium);
        }

        /* ========== GRID SYSTEMS ========== */
        .grid-2x2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 20px 0;
        }

        /* ========== ACHIEVEMENT CARD SYSTEM ========== */
        .achievement-card {
            padding: 24px;
            aspect-ratio: 9/16;
            max-width: 200px;
            margin: 0 auto;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            position: relative;
            text-align: center;
        }

        .card-rarity-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 4px 8px;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* ========== CARD STYLE SELECTOR ========== */
        .style-selector {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 16px 0;
        }

        .style-option {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .style-option.selected {
            border-color: var(--yellow-cta);
        }

        .style-gradient-1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .style-gradient-2 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .style-gradient-3 {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        /* ========== TYPOGRAPHY SYSTEM ========== */
        .hero-title {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.2;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .body-text {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .caption-text {
            font-size: 14px;
            color: var(--text-caption);
            line-height: 1.4;
        }

        /* ========== BOTTOM NAVIGATION ========== */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--crystal-white);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.8);
            padding: 12px 0 24px;
        }

        .nav-items {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-caption);
        }

        .nav-item.active {
            color: var(--yellow-cta);
        }

        /* ========== ANIMATIONS ========== */
        @keyframes premiumFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        @keyframes premiumGlow {
            0%, 100% { box-shadow: var(--shadow-soft); }
            50% { box-shadow: var(--shadow-medium), 0 0 40px rgba(255, 127, 80, 0.3); }
        }

        .float { animation: premiumFloat 4s ease-in-out infinite; }
        .glow { animation: premiumGlow 3s ease-in-out infinite; }

        /* ========== CUSTOM SCROLLBAR ========== */
        .page-content::-webkit-scrollbar {
            width: 4px;
        }

        .page-content::-webkit-scrollbar-thumb {
            background: var(--yellow-cta);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="phone-frame float">
        <div class="phone-screen">
            <div class="status-bar">
                <span>10:05</span>
                <span>📶 🔋</span>
            </div>

            <div class="page-content">
                <div class="full-height-content">
                    <!-- Header -->
                    <div style="text-align: center; margin-bottom: 32px;">
                        <h1 class="hero-title">Workout Complete!</h1>
                        <p class="body-text">Amazing job! Here's your achievement card</p>
                    </div>

                    <!-- Stats Grid -->
                    <div class="grid-2x2" style="margin-bottom: 32px;">
                        <div class="premium-card" style="padding: 20px; text-align: center;">
                            <h3 style="font-size: 24px; color: var(--yellow-cta); margin-bottom: 4px;">1:02</h3>
                            <p class="caption-text">Duration</p>
                        </div>
                        <div class="premium-card" style="padding: 20px; text-align: center;">
                            <h3 style="font-size: 24px; color: var(--yellow-cta); margin-bottom: 4px;">42</h3>
                            <p class="caption-text">Calories</p>
                        </div>
                        <div class="premium-card" style="padding: 20px; text-align: center;">
                            <h3 style="font-size: 24px; color: var(--yellow-cta); margin-bottom: 4px;">3</h3>
                            <p class="caption-text">Exercises</p>
                        </div>
                        <div class="premium-card" style="padding: 20px; text-align: center;">
                            <h3 style="font-size: 24px; color: var(--yellow-cta); margin-bottom: 4px;">FINE</h3>
                            <p class="caption-text">Rarity</p>
                        </div>
                    </div>

                    <!-- Achievement Card Preview -->
                    <div style="text-align: center; margin-bottom: 32px;">
                        <p class="section-title" style="margin-bottom: 16px;">Your Achievement Card</p>
                        <div class="premium-card glow achievement-card">
                            <div class="card-rarity-badge">FINE</div>
                            <div style="margin-top: 40px;">
                                <h4 style="font-size: 18px; margin-bottom: 8px;">Chair & Full Body</h4>
                                <p style="font-size: 14px; opacity: 0.9;">Home Workout</p>
                                <div style="margin: 20px 0; font-size: 32px;">🪑🦢</div>
                                <p style="font-size: 16px; font-weight: 600;">1:02</p>
                                <p style="font-size: 12px; opacity: 0.8;">Nov 4, 2024</p>
                            </div>
                        </div>
                    </div>

                    <!-- Card Style Selection -->
                    <div style="margin-bottom: 24px;">
                        <p class="caption-text" style="margin-bottom: 12px; text-align: center;">Card Style</p>
                        <div class="style-selector">
                            <div class="style-option style-gradient-1 selected" onclick="selectStyle(this, 1)"></div>
                            <div class="style-option style-gradient-2" onclick="selectStyle(this, 2)"></div>
                            <div class="style-option style-gradient-3" onclick="selectStyle(this, 3)"></div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div style="margin-bottom: 80px;">
                        <button style="width: 100%; background: var(--yellow-cta); color: var(--premium-black); border: none; border-radius: 16px; padding: 16px; font-size: 18px; font-weight: 700; margin-bottom: 12px; cursor: pointer;">
                            Share Achievement
                        </button>
                        <button style="width: 100%; padding: 12px; background: transparent; border: 2px solid var(--yellow-cta); color: var(--yellow-cta); border-radius: 16px; font-weight: 600; cursor: pointer;">
                            Start Another Workout
                        </button>
                    </div>
                </div>
            </div>

            <div class="bottom-nav">
                <div class="nav-items">
                    <div class="nav-item">
                        <span style="font-size: 20px;">🏠</span>
                        <span style="font-size: 11px;">Home</span>
                    </div>
                    <div class="nav-item">
                        <span style="font-size: 20px;">📷</span>
                        <span style="font-size: 11px;">Camera</span>
                    </div>
                    <div class="nav-item active">
                        <span style="font-size: 20px;">👤</span>
                        <span style="font-size: 11px;">My</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function selectStyle(selectedOption, styleNumber) {
            // Remove selected class from all options
            document.querySelectorAll('.style-option').forEach(option => {
                option.classList.remove('selected');
            });

            // Add selected class to clicked option
            selectedOption.classList.add('selected');

            // Update achievement card background based on style
            const achievementCard = document.querySelector('.achievement-card');

            switch(styleNumber) {
                case 1:
                    achievementCard.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                    break;
                case 2:
                    achievementCard.style.background = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
                    break;
                case 3:
                    achievementCard.style.background = 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)';
                    break;
            }
        }
    </script>
</body>
</html>
